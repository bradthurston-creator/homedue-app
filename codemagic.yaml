workflows:
  ios-build:
    name: HomeDue iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_ID: com.homedue.app
        APP_NAME: HomeDue
        APP_VERSION: 1.0
      groups:
        - apple_credentials
      node: 22
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: Codemagic

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Patch iOS deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.5;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '16.0'/g" ios/App/Podfile

      - name: Sync Capacitor with iOS
        script: npx cap sync ios

      - name: Configure project
        script: |
          plutil -insert ITSAppUsesNonExemptEncryption -bool NO ios/App/App/Info.plist 2>/dev/null || true

      - name: Set build version
        script: |
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-1}
          echo "Setting version $APP_VERSION ($BUILD_NUM)"
          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = $APP_VERSION;/g" ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $BUILD_NUM;/g" ios/App/App.xcodeproj/project.pbxproj

      - name: Download provisioning profile
        script: |
          set -x
          mkdir -p /tmp/profiles
          mkdir -p /tmp/certs
          keychain initialize
          echo "=== Fetching signing files ==="
          app-store-connect fetch-signing-files $APP_ID \
            --type IOS_APP_STORE \
            --create \
            --profiles-dir /tmp/profiles \
            --certificates-dir /tmp/certs 2>&1
          echo "Exit code: $?"
          echo "=== Files in /tmp/profiles ==="
          ls -la /tmp/profiles/ 2>&1
          echo "=== Files in /tmp/certs ==="
          ls -la /tmp/certs/ 2>&1
          keychain add-certificates --certificates-dir /tmp/certs 2>&1
          echo "=== Keychain identities ==="
          security find-identity -v -p ios 2>&1

      - name: Save profile location
        script: |
          PROFILE_FILE=""
          for f in /tmp/profiles/*.mobileprovision; do
            [ -f "$f" ] || continue
            PROFILE_FILE="$f"
            break
          done
          if [ -z "$PROFILE_FILE" ]; then
            echo "ERROR: No profile downloaded!"
            exit 1
          fi
          cp "$PROFILE_FILE" /tmp/app.mobileprovision
          PROFILE_NAME=$(security cms -D -i /tmp/app.mobileprovision 2>/dev/null | awk '/<key>Name<\/key>/{getline; gsub(/<[^>]*>/,""); print}' | xargs)
          echo "$PROFILE_NAME" > /tmp/profile_name.txt
          echo "Saved profile: $PROFILE_NAME"

      - name: Build unsigned archive
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            DEVELOPMENT_TEAM=DN52659LL2 \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Sign and package IPA
        script: |
          ARCHIVE=/tmp/xcarchive/HomeDue.xcarchive
          APP_PATH="$ARCHIVE/Products/Applications/App.app"
          IPA_DIR=/tmp/ipa
          mkdir -p "$IPA_DIR"

          PROFILE_NAME=$(cat /tmp/profile_name.txt)
          echo "Using profile: $PROFILE_NAME"

          cp /tmp/app.mobileprovision "$APP_PATH/embedded.mobileprovision"

          SIGN_IDENTITY=$(security find-identity -v -p ios 2>&1 | grep "iPhone Distribution" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Signing identity: $SIGN_IDENTITY"

          find "$APP_PATH" -name "*.framework" -d | while read fw; do
            codesign -f -s "$SIGN_IDENTITY" --generate-entitlement-der "$fw" 2>&1
          done
          find "$APP_PATH" -name "*.dylib" | while read lib; do
            codesign -f -s "$SIGN_IDENTITY" "$lib" 2>&1
          done

          /usr/libexec/PlistBuddy -c "Clear dict" /tmp/entitlements.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add keychain-access-groups array" /tmp/entitlements.plist
          /usr/libexec/PlistBuddy -c "Add keychain-access-groups:0 string \$(AppIdentifierPrefix)com.homedue.app" /tmp/entitlements.plist

          codesign -f -s "$SIGN_IDENTITY" --entitlements /tmp/entitlements.plist --generate-entitlement-der "$APP_PATH" 2>&1

          codesign -v "$APP_PATH" 2>&1 && echo "SIGNATURE VALID" || echo "SIGNATURE INVALID"

          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -qr App.ipa Payload/
          echo "IPA ready: $IPA_DIR/App.ipa"

    artifacts:
      - /tmp/xcarchive/*.xcarchive
      - /tmp/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - brad.thurston@gmail.com