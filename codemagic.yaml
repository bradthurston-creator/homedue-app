workflows:
  ios-build:
    name: HomeDue iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_ID: com.homedue.app
        APP_NAME: HomeDue
        APP_VERSION: 1.0
        # BUILD_NUMBER is auto-incremented by Codemagic
      node: latest
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: Codemagic

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Add iOS platform
        script: npx cap add ios

      - name: Sync Capacitor with iOS
        script: npx cap sync ios

      - name: Set app bundle identifier
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $APP_ID" ios/App/App/Info.plist

      - name: Set build version
        script: |
          # Use Codemagic auto-incrementing build number
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-1}
          echo "Setting version $APP_VERSION ($BUILD_NUM)"
          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = $APP_VERSION;/g" ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $BUILD_NUM;/g" ios/App/App.xcodeproj/project.pbxproj

      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=DN52659LL2 \
            archive

      - name: Export IPA
        script: |
          mkdir -p /tmp/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist ios/exportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - /tmp/xcarchive/*.xcarchive
      - /tmp/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - brad.thurston@gmail.com