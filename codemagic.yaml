workflows:
  ios-build:
    name: HomeDue iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_ID: com.homedue.app
        APP_NAME: HomeDue
        APP_VERSION: 1.0
        APP_STORE_CONNECT_ISSUER_ID: fa233451-1f0a-4677-baac-21185e4cb1ec
        APP_STORE_CONNECT_KEY_IDENTIFIER: 2NBS93SRAY
      groups:
        - apple_credentials
      node: 22
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: Codemagic

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Patch iOS deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.5;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '16.0'/g" ios/App/Podfile

      - name: Sync Capacitor with iOS
        script: npx cap sync ios

      - name: Configure project
        script: |
          plutil -insert ITSAppUsesNonExemptEncryption -bool NO ios/App/App/Info.plist 2>/dev/null || true

      - name: Set build version
        script: |
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-1}
          echo "Setting version $APP_VERSION ($BUILD_NUM)"
          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = $APP_VERSION;/g" ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $BUILD_NUM;/g" ios/App/App.xcodeproj/project.pbxproj

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $APP_ID --type IOS_APP_STORE --create --certificate-key @env:CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          echo "Signing files ready"

      - name: Build iOS app (unsigned archive)
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            DEVELOPMENT_TEAM=DN52659LL2 \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export IPA with signing
        script: |
          # Find the provisioning profile for our bundle ID
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          if [ ! -d "$PROFILE_DIR" ] || [ -z "$(ls "$PROFILE_DIR"/*.mobileprovision 2>/dev/null)" ]; then
            PROFILE_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          fi
          PROFILE_PATH=""
          for f in "$PROFILE_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            if security cms -D -i "$f" 2>/dev/null | grep -q "$APP_ID"; then
              PROFILE_PATH="$f"
              echo "Found profile: $f"
              break
            fi
          done
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found for $APP_ID"
            exit 1
          fi
          # Extract profile name
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | plutil -extract Name xml1 - -o - 2>/dev/null | plutil -convert json -o - - 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin))")
          echo "Profile name: $PROFILE_NAME"
          # Generate export options with explicit profile reference
          /usr/libexec/PlistBuddy -c "Clear dict" /tmp/export.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add method string app-store" /tmp/export.plist
          /usr/libexec/PlistBuddy -c "Add teamID string DN52659LL2" /tmp/export.plist
          /usr/libexec/PlistBuddy -c "Add signingStyle string manual" /tmp/export.plist
          /usr/libexec/PlistBuddy -c "Add provisioningProfiles dict" /tmp/export.plist
          /usr/libexec/PlistBuddy -c "Add provisioningProfiles:$APP_ID string $PROFILE_NAME" /tmp/export.plist
          /usr/libexec/PlistBuddy -c "Add uploadSymbols bool true" /tmp/export.plist
          mkdir -p /tmp/ipa
          echo "Exporting IPA..."
          xcodebuild -exportArchive \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist /tmp/export.plist

    artifacts:
      - /tmp/xcarchive/*.xcarchive
      - /tmp/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - brad.thurston@gmail.com