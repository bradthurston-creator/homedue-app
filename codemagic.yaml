workflows:
  ios-build:
    name: HomeDue iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_ID: com.homedue.app
        APP_NAME: HomeDue
        APP_STORE_CONNECT_ISSUER_ID: fa233451-1f0a-4677-baac-21185e4cb1ec
        APP_STORE_CONNECT_KEY_IDENTIFIER: 2NBS93SRAY
        DEVELOPMENT_TEAM: DN52659LL2
      node: latest
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: Codemagic

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Sync Capacitor with iOS
        script: |
          npx cap sync ios

      - name: Set app bundle identifier
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $APP_ID" App/Info.plist

      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            archive

      - name: Export IPA
        script: |
          mkdir -p /tmp/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist ios/exportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - /tmp/xcarchive/*.xcarchive
      - /tmp/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - brad.thurston@gmail.com