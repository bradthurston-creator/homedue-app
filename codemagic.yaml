workflows:
  ios-build:
    name: HomeDue iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.homedue.app
      vars:
        APP_ID: com.homedue.app
        APP_NAME: HomeDue
        APP_VERSION: 1.0
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      groups:
        - apple_credentials
      node: 22
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: Codemagic

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Patch iOS deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.5;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '16.0'/g" ios/App/Podfile

      - name: Sync Capacitor with iOS
        script: npx cap sync ios

      - name: Configure project
        script: |
          plutil -insert ITSAppUsesNonExemptEncryption -bool NO ios/App/App/Info.plist 2>/dev/null || true

      - name: Set build version
        script: |
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-1}
          echo "Setting version $APP_VERSION ($BUILD_NUM)"
          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = $APP_VERSION;/g" ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $BUILD_NUM;/g" ios/App/App.xcodeproj/project.pbxproj

      - name: Download profiles (use-profiles), then revert to Automatic signing
        script: |
          keychain initialize
          # First, run use-profiles to download the provisioning profile
          # This sets Manual signing in pbxproj, which we revert below
          xcode-project use-profiles 2>&1
          echo "=== Profile downloaded, now reverting pbxproj to Automatic ==="
          # Revert the main app target back to Automatic signing
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' ios/App/App.xcodeproj/project.pbxproj
          # Remove PROVISIONING_PROFILE_SPECIFIER from main app target
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' ios/App/App.xcodeproj/project.pbxproj
          echo "=== Profiles on disk ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>&1 || echo "no legacy"
          ls -la "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/" 2>&1 || echo "no xcode"

      - name: Build archive (unsigned, Capacitor-safe)
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            DEVELOPMENT_TEAM=DN52659LL2 \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export IPA
        script: |
          # Find the profile
          PROFILE_FILE=""
          for d in "$HOME/Library/MobileDevice/Provisioning Profiles" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            for f in "$d"/*.mobileprovision; do
              [ -f "$f" ] || continue
              PROFILE_FILE="$f"
              break 2
            done
          done
          echo "Using profile: $PROFILE_FILE"
          if [ -z "$PROFILE_FILE" ]; then
            echo "No profile found!"
            exit 1
          fi
          # Extract profile name
          PROFILE_NAME=$(security cms -D -i "$PROFILE_FILE" 2>/dev/null | awk '/<key>Name<\/key>/{getline; gsub(/<[^>]*>/,""); print}' | xargs)
          echo "Profile name: $PROFILE_NAME"
          # Build export plist
          /usr/libexec/PlistBuddy -c "Clear dict" /tmp/export.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add method string app-store" /tmp/export.plist
          /usr/libexec/PlistBuddy -c "Add teamID string DN52659LL2" /tmp/export.plist
          /usr/libexec/PlistBuddy -c "Add signingStyle string manual" /tmp/export.plist
          /usr/libexec/PlistBuddy -c "Add provisioningProfiles dict" /tmp/export.plist
          /usr/libexec/PlistBuddy -c "Add provisioningProfiles:$APP_ID string $PROFILE_NAME" /tmp/export.plist
          /usr/libexec/PlistBuddy -c "Add uploadSymbols bool true" /tmp/export.plist
          mkdir -p /tmp/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist /tmp/export.plist

    artifacts:
      - /tmp/xcarchive/*.xcarchive
      - /tmp/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - brad.thurston@gmail.com