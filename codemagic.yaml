workflows:
  ios-build:
    name: HomeDue iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_ID: com.homedue.app
        APP_NAME: HomeDue
        APP_VERSION: 1.0
        APP_STORE_CONNECT_ISSUER_ID: fa233451-1f0a-4677-baac-21185e4cb1ec
        APP_STORE_CONNECT_KEY_IDENTIFIER: 2NBS93SRAY
      groups:
        - apple_credentials
      node: 22
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: Codemagic

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Patch iOS deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.5;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '16.0'/g" ios/App/Podfile

      - name: Sync Capacitor with iOS
        script: npx cap sync ios

      - name: Configure project
        script: |
          plutil -insert ITSAppUsesNonExemptEncryption -bool NO ios/App/App/Info.plist 2>/dev/null || true

      - name: Set build version
        script: |
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-1}
          echo "Setting version $APP_VERSION ($BUILD_NUM)"
          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = $APP_VERSION;/g" ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $BUILD_NUM;/g" ios/App/App.xcodeproj/project.pbxproj

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $APP_ID --type IOS_APP_STORE --create --certificate-key @env:CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          # Copy profiles to MobileDevice
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || true
          # Set Manual signing with the profile name
          PROFILE_FILE=$(ls "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision 2>/dev/null | head -1)
          if [ -n "$PROFILE_FILE" ]; then
            PROFILE_NAME=$(security cms -D -i "$PROFILE_FILE" 2>/dev/null | plutil -extract Name raw - 2>/dev/null || echo "")
            echo "Profile: $PROFILE_NAME"
            sed -i '' "s/CODE_SIGN_STYLE = [^;]*;/CODE_SIGN_STYLE = Manual;/g" ios/App/App.xcodeproj/project.pbxproj
            sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = $PROFILE_NAME;/g" ios/App/App.xcodeproj/project.pbxproj
            echo "$PROFILE_NAME" > /tmp/homedue_profile_name.txt
          else
            echo "WARNING: No profile found"
          fi
          echo "Code signing setup complete"

      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            DEVELOPMENT_TEAM=DN52659LL2 \
            archive

      - name: Export IPA
        script: |
          mkdir -p /tmp/ipa
          PROFILE_UUID=$(cat /tmp/homedue_profile_uuid.txt 2>/dev/null || echo "")
          PROFILE_NAME=$(cat /tmp/homedue_profile_name.txt 2>/dev/null || echo "")
          echo "Exporting with profile: $PROFILE_NAME ($PROFILE_UUID)"
          /usr/libexec/PlistBuddy -x \
            -c "Add :method string app-store-connect" \
            -c "Add :teamID string DN52659LL2" \
            -c "Add :compileBitcode bool false" \
            -c "Add :signingStyle string manual" \
            -c "Add :provisioningProfiles dict" \
            -c "Add :provisioningProfiles:${APP_ID} string $(cat /tmp/homedue_profile_name.txt)" \
            /tmp/exportOptions.plist 2>/dev/null
          xcodebuild -exportArchive \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist /tmp/exportOptions.plist

    artifacts:
      - /tmp/xcarchive/*.xcarchive
      - /tmp/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - brad.thurston@gmail.com
