workflows:
  ios-build:
    name: HomeDue iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        APP_ID: com.homedue.app
        APP_NAME: HomeDue
        APP_VERSION: 1.0
        APP_STORE_CONNECT_ISSUER_ID: fa233451-1f0a-4677-baac-21185e4cb1ec
        APP_STORE_CONNECT_KEY_IDENTIFIER: 2NBS93SRAY
      groups:
        - apple_credentials
      node: 22
      xcode: latest
      cocoapods: default

    integrations:
      app_store_connect: Codemagic

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Patch iOS deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.5;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '16.0'/g" ios/App/Podfile

      - name: Sync Capacitor with iOS
        script: npx cap sync ios

      - name: Configure project
        script: |
          plutil -insert ITSAppUsesNonExemptEncryption -bool NO ios/App/App/Info.plist 2>/dev/null || true

      - name: Set build version
        script: |
          BUILD_NUM=${PROJECT_BUILD_NUMBER:-1}
          echo "Setting version $APP_VERSION ($BUILD_NUM)"
          sed -i '' "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = $APP_VERSION;/g" ios/App/App.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = $BUILD_NUM;/g" ios/App/App.xcodeproj/project.pbxproj

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $APP_ID --type IOS_APP_STORE --create --certificate-key @env:CERTIFICATE_PRIVATE_KEY
          keychain add-certificates
          echo "Signing files ready"

      - name: Build unsigned archive
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/xcarchive/HomeDue.xcarchive \
            DEVELOPMENT_TEAM=DN52659LL2 \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Manually sign and package IPA
        script: |
          ARCHIVE=/tmp/xcarchive/HomeDue.xcarchive
          APP_PATH="$ARCHIVE/Products/Applications/App.app"
          IPA_DIR=/tmp/ipa
          mkdir -p "$IPA_DIR"

          echo "=== Finding provisioning profile ==="
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          [ -d "$PROFILE_DIR" ] || PROFILE_DIR="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          PROFILE_PATH=""
          for f in "$PROFILE_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            if security cms -D -i "$f" 2>/dev/null | grep -q "$APP_ID"; then
              PROFILE_PATH="$f"
              echo "Profile: $f"
              break
            fi
          done
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No profile found for $APP_ID"
            ls -la "$PROFILE_DIR"/ 2>/dev/null || echo "No profiles dir"
            exit 1
          fi

          echo "=== Copying provisioning profile into app bundle ==="
          cp "$PROFILE_PATH" "$APP_PATH/embedded.mobileprovision"

          echo "=== Listing available signing identities ==="
          security find-identity -v -p ios || echo "No identities found"

          echo "=== Extracting entitlements ==="
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null > /tmp/entitlements.plist || echo "No existing entitlements, using empty"
          if [ ! -s /tmp/entitlements.plist ]; then
            /usr/libexec/PlistBuddy -c "Clear dict" /tmp/entitlements.plist 2>/dev/null || true
          fi

          echo "=== Signing all frameworks and dylibs ==="
          find "$APP_PATH" -name "*.framework" -d | while read fw; do
            echo "Signing framework: $fw"
            codesign -f -s "iPhone Distribution" --generate-entitlement-der "$fw" 2>&1 || echo "Failed: $fw"
          done
          find "$APP_PATH" -name "*.dylib" -d | while read lib; do
            echo "Signing dylib: $lib"
            codesign -f -s "iPhone Distribution" "$lib" 2>&1 || echo "Failed: $lib"
          done

          echo "=== Signing main app bundle ==="
          codesign -f -s "iPhone Distribution" --entitlements /tmp/entitlements.plist --generate-entitlement-der "$APP_PATH" 2>&1

          echo "=== Verifying signature ==="
          codesign -v "$APP_PATH" 2>&1 && echo "Signature valid" || echo "Signature invalid"

          echo "=== Creating IPA ==="
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -qr App.ipa Payload/
          echo "=== IPA created at $IPA_DIR/App.ipa ==="

    artifacts:
      - /tmp/xcarchive/*.xcarchive
      - /tmp/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - brad.thurston@gmail.com